<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Setup | Kakatiya InnovateX Technologies</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap');
    :root {
      --dark-bg: #0B1120;
      --dark-card: rgba(15, 23, 42, 0.75);
      --dark-border: rgba(255, 255, 255, 0.08);
      --royal-blue: #0057D9;
      --gold: #C99A2E;
      --white: #FFFFFF;
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    body {
      background-color: var(--dark-bg);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .glow-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 87, 217, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
    }
    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; }
    
    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 15px;
      z-index: 10;
    }
    .glass-card {
      background: var(--dark-card);
      border: 1.5px solid var(--dark-border);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      padding: 40px;
      transition: border-color 0.3s;
    }
    .glass-card:hover {
      border-color: rgba(201, 154, 46, 0.3);
    }
    .brand-title {
      font-family: var(--font-heading);
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .text-gradient-gold {
      background: linear-gradient(135deg, #C99A2E 0%, #E6BA5E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-control {
      background-color: rgba(15, 23, 42, 0.8) !important;
      border: 1px solid var(--dark-border);
      color: var(--white) !important;
      padding: 12px 16px;
      border-radius: 10px;
    }
    .form-control:focus {
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(201, 154, 46, 0.25);
    }
    .btn-gold-custom {
      background: linear-gradient(135deg, #C99A2E 0%, #E6BA5E 100%);
      border: none;
      color: #0B1120;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .btn-gold-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(201, 154, 46, 0.3);
      background: linear-gradient(135deg, #E6BA5E 0%, #C99A2E 100%);
      color: #0B1120;
    }
    .btn-gold-custom:disabled {
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }
    .text-muted {
      color: #94A3B8 !important;
    }
    .form-control::placeholder {
      color: #475569 !important;
    }
    .alert-custom {
      border-radius: 10px;
      background-color: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #ea868f;
      display: none;
    }
    .alert-success-custom {
      border-radius: 10px;
      background-color: rgba(25, 135, 84, 0.15);
      border: 1px solid rgba(25, 135, 84, 0.3);
      color: #75b798;
      display: none;
    }
  </style>
</head>
<body>

  <div class="glow-circle glow-1"></div>
  <div class="glow-circle glow-2"></div>

  <div class="login-container">
    <div class="glass-card">
      <div class="text-center mb-4">
        <img src="/static/images/logo-emblem.png" alt="Logo" width="60" class="mb-3">
        <h2 class="brand-title h4 text-white mb-0">ADMIN SETUP</h2>
        <span class="text-uppercase text-gradient-gold fw-bold" style="font-size: 0.75rem; letter-spacing: 0.12em;">Create Credentials</span>
        <p class="text-muted small mt-2">Initialize your live live administrative dashboard account</p>
      </div>

      <div class="alert alert-custom mb-3" id="errorAlert" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="errorMsg">Registration failed.</span>
      </div>

      <div class="alert alert-success-custom mb-3" id="successAlert" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> Setup complete! Redirecting to login...
      </div>

      <form id="setupForm">
        <div class="mb-3">
          <label for="username" class="form-label text-muted small">Choose Admin Username</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
            <input type="text" id="username" class="form-control" placeholder="Create username" required minlength="4">
          </div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label text-muted small">Choose Password (min. 6 characters)</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Create secure password" required minlength="6">
          </div>
        </div>
        <div class="mb-4">
          <label for="confirmPassword" class="form-label text-muted small">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-gold-custom w-100 mb-2" id="submitBtn">
          Initialize Admin Account
        </button>
      </form>
    </div>
  </div>

  <script>
    // Verify if setup is actually needed
    fetch('/auth/setup-required')
      .then(res => res.json())
      .then(data => {
        if (!data.setup_required) {
          window.location.href = '/admin/login.html';
        }
      });

    const form = document.getElementById('setupForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.style.display = 'none';
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorMsg.innerText = "Passwords do not match.";
        errorAlert.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;

      try {
        const res = await fetch('/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
          successAlert.style.display = 'block';
          form.style.display = 'none';
          setTimeout(() => {
            window.location.href = '/admin/login.html';
          }, 2000);
        } else {
          throw new Error(data.error || 'Setup registration failed.');
        }
      } catch (err) {
        errorMsg.innerText = err.message;
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
