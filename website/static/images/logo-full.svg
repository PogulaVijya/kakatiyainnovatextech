<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Dark Blue Gradient for Letter K -->
    <linearGradient id="blueKGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002D72" />
      <stop offset="100%" stop-color="#00205B" />
    </linearGradient>
    
    <!-- Royal Blue to Cyan Gradient for Swoosh -->
    <linearGradient id="swooshGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0057D9" />
      <stop offset="50%" stop-color="#0088F0" />
      <stop offset="100%" stop-color="#00C0FF" />
    </linearGradient>

    <!-- Gold Gradient for Letter I -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C99A2E" />
      <stop offset="50%" stop-color="#F2C159" />
      <stop offset="100%" stop-color="#9E721D" />
    </linearGradient>

    <!-- Stone Arch Gradient (Detailed look) -->
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5A6D8C" />
      <stop offset="50%" stop-color="#7C92B3" />
      <stop offset="100%" stop-color="#414F66" />
    </linearGradient>
  </defs>

  <g transform="translate(150, 20)">
    <!-- 1. ARCH (In the background) -->
    <g transform="translate(130, 45) scale(0.6)" opacity="0.95">
      <!-- Pillars -->
      <path d="M 60 160 L 60 380 L 95 380 L 95 160 Z" fill="url(#archGrad)" />
      <path d="M 285 160 L 285 380 L 320 380 L 320 160 Z" fill="url(#archGrad)" />
      <rect x="45" y="380" width="65" height="15" fill="#2D3748" rx="2" />
      <rect x="270" y="380" width="65" height="15" fill="#2D3748" rx="2" />
      
      <!-- Arch beam layers -->
      <rect x="20" y="95" width="340" height="35" fill="url(#archGrad)" rx="3" />
      <rect x="45" y="55" width="290" height="20" fill="url(#archGrad)" rx="2" />
      <path d="M 95 160 Q 190 125 285 160" stroke="url(#archGrad)" stroke-width="12" fill="none" />
      <path d="M 105 160 Q 190 135 275 160" stroke="#C99A2E" stroke-width="3" fill="none" />

      <!-- Capitals -->
      <rect x="52" y="138" width="50" height="15" fill="#7C92B3" rx="1" />
      <rect x="278" y="138" width="50" height="15" fill="#7C92B3" rx="1" />
      
      <!-- Top Crown decorations -->
      <polygon points="90,55 110,25 150,25 170,55" fill="url(#archGrad)" />
      <polygon points="210,55 230,25 270,25 290,55" fill="url(#archGrad)" />
      <polygon points="160,55 180,10 200,10 220,55" fill="url(#archGrad)" />
    </g>

    <!-- 2. FOREGROUND LETTERS: K & I (Overlapping the Arch columns) -->
    <!-- Letter K (Elegant Serif) -->
    <path d="M 150 220 L 150 480" stroke="url(#blueKGrad)" stroke-width="32" stroke-linecap="square" />
    <path d="M 115 220 L 185 220" stroke="url(#blueKGrad)" stroke-width="12" stroke-linecap="square" />
    <path d="M 115 480 L 185 480" stroke="url(#blueKGrad)" stroke-width="12" stroke-linecap="square" />
    <path d="M 166 350 L 295 220 L 330 220 L 166 385 Z" fill="url(#blueKGrad)" />
    <path d="M 205 348 L 308 480 L 355 480 L 245 348 Z" fill="url(#blueKGrad)" />

    <!-- Letter I (Elegant Serif, placed on the right) -->
    <path d="M 370 220 L 370 480" stroke="url(#goldGrad)" stroke-width="32" stroke-linecap="square" />
    <path d="M 335 220 L 405 220" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="square" />
    <path d="M 335 480 L 405 480" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="square" />

    <!-- 3. ROYAL BLUE SWOOSH (Curves from bottom-left to top-right) -->
    <path d="M 130 475 C 190 435, 300 295, 395 230" stroke="url(#swooshGrad)" stroke-width="20" fill="none" stroke-linecap="round" />

    <!-- 4. FLOATING PIXEL SQUARES (Trailing off the top-right of I) -->
    <g fill="url(#blueKGrad)">
      <rect x="405" y="180" width="14" height="14" />
      <rect x="425" y="195" width="10" height="10" />
      <rect x="445" y="170" width="12" height="12" />
    </g>
    <g fill="url(#goldGrad)">
      <rect x="425" y="150" width="12" height="12" />
      <rect x="445" y="135" width="9" height="9" />
      <rect x="458" y="152" width="7" height="7" />
    </g>
  </g>

  <!-- Typography (Centered below, optimized with white/gold for dark theme) -->
  <!-- "KAKATIYA" in large corporate serif font (White) -->
  <text x="400" y="605" font-family="'Outfit', 'Georgia', serif" font-weight="900" font-size="78" fill="#FFFFFF" text-anchor="middle" letter-spacing="10">KAKATIYA</text>
  
  <!-- "— INNOVATEX TECHNOLOGIES —" in gold -->
  <text x="400" y="665" font-family="'Outfit', 'Inter', sans-serif" font-weight="700" font-size="28" fill="#C99A2E" text-anchor="middle" letter-spacing="4">— INNOVATEX TECHNOLOGIES —</text>
  
  <!-- Tagline: "INNOVATE • INTEGRATE • ELEVATE" (White/Light Blue) -->
  <text x="400" y="715" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#E2E8F0" text-anchor="middle" letter-spacing="6">INNOVATE  •  INTEGRATE  •  ELEVATE</text>
</svg>
